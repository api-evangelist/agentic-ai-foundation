aid: agentic-ai-foundation
name: Agentic AI Foundation
description: >-
  The Agentic AI Foundation (AAIF) is a Linux Foundation project formed in December 2025 that brings together critical open standards for AI agents. It hosts Anthropic's Model Context Protocol (MCP), Block's goose, and OpenAI's AGENTS.md under neutral governance to enable interoperable AI agent ecosystems.
